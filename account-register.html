<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FAF8F5" />
  <meta name="acct-title-key" content="title.register" />
  <title>Maison Han ?? Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300..600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/accounts.css?v=20260211" />
  <style id="acct-storefront-shell">
  body{background:#faf8f5;color:rgba(41,36,36,.72)}
  .acct-shell{min-height:100vh;background:radial-gradient(120% 80% at 50% -10%,rgba(160,120,69,.08),transparent),linear-gradient(180deg,#faf8f5,#f3ede6)}
  .acct-bar{background:rgba(250,248,245,.92);border-bottom:1px solid rgba(41,36,36,.09)}
  .acct-bar__brand{color:#292420}
  .acct-lang,.acct-lang span{color:rgba(41,36,36,.72)}
  .card{background:rgba(255,255,255,.92);border:1px solid rgba(41,36,36,.09)}
  .verify-block .muted{background:rgba(255,255,255,.92);border:1px solid rgba(41,36,36,.09)}
  label{color:rgba(41,36,36,.72)}
  .api-box input,input[type=email],input[type=password],input[type=text]{background:rgba(250,248,245,.6)!important;border:1px solid rgba(41,36,36,.09)!important;color:#292420!important}
  .btn{border:1px solid rgba(41,36,36,.09)!important;color:#292420!important;background:transparent!important}
  .btn--solid{border:none!important;color:#fffefb!important;background:linear-gradient(135deg,#a07845,#7e5f38)!important}
  .row-links a{color:#7e5f38}
  </style>
</head>
<body>
<div class="acct-shell">
  <header class="acct-bar">
    <div class="acct-bar__brand"><a href="index.html">Maison Han</a></div>
    <div class="acct-bar__tools">
      <div class="acct-lang">
        <span data-acct-i18n="acct.lang">Language</span>
                        <select id="acctLang" aria-label="Language">
          <option value="en">EN</option>
          <option value="zh-CN">????</option>
          <option value="zh-TW">·±ów</option>
          <option value="ja">ČŐ±ľ??</option>
          <option value="ko">????</option>
          <option value="fr">FR</option>
          <option value="es">ES</option>
          <option value="vi">VN</option>
          <option value="th">TH</option>
          <option value="ar">????</option>
        </select>
      </div>
    </div>
  </header>
  <div class="wrap">
    <div class="api-box">
      <label for="apiBase" data-acct-i18n="api.label">API base</label>
      <input type="text" id="apiBase" data-acct-i18n-placeholder="api.placeholder" autocomplete="off" />
    </div>
    <div class="msg err" id="err"></div>
    <div class="card">
      <form id="form">
        <label for="email" data-acct-i18n="email.label">Email</label>
        <input id="email" type="email" required autocomplete="email" />
        <label for="nick" data-acct-i18n="nick.optional">Nickname (optional)</label>
        <input id="nick" type="text" maxlength="64" autocomplete="nickname" />
        <label for="password" data-acct-i18n="password_hint.register">Password (8??72 chars)</label>
        <input id="password" type="password" required autocomplete="new-password" minlength="8" />
        <button class="btn btn--solid" type="submit" data-acct-i18n="btn.create">Create account</button>
      </form>
      <div class="row-links">
        <a href="account-login.html" data-acct-i18n="link.signin">Sign in</a>
        <span class="acct-sep">ˇ¤</span>
        <a href="index.html" data-acct-i18n="link.home">Home</a>
      </div>
    </div>
  </div>
</div>
<script src="js/account-i18n.js"></script>
<script src="js/portal-api.js"></script>
<script>
(function () {
  HanAccountI18n.init(document);
  var apiEl = document.getElementById('apiBase');
  try {
    apiEl.value = localStorage.getItem(HanPortal.API_KEY) || '';
  } catch (e) {}
  apiEl.addEventListener('change', function () {
    try {
      localStorage.setItem(HanPortal.API_KEY, apiEl.value.trim());
    } catch (e) {}
  });
  document.getElementById('form').onsubmit = function (ev) {
    ev.preventDefault();
    var err = document.getElementById('err');
    err.style.display = 'none';
    HanPortal.register({
      email: email.value.trim(),
      nickName: nick.value.trim(),
      password: password.value,
    })
      .then(function () {
        alert(HanAccountI18n.t('alert.register_ok'));
        window.location.href = 'account.html';
      })
      .catch(function (e) {
        err.textContent = e.message || HanAccountI18n.t('err.register_failed');
        err.style.display = 'block';
      });
  };
})();
</script>
</body>
</html>
