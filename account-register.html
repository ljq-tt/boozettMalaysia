<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maison Han - Register</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Manrope:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="css/accounts.css">
</head>
<body>
<div class="wrap">
  <div class="brand">Maison Han</div>
  <div class="api-box">
    <label for="apiBase">API base</label>
    <input type="text" id="apiBase" placeholder="https://your-host/prod-api" />
  </div>
  <div class="msg err" id="err"></div>
  <div class="card">
    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="email" />
      <label for="nick">Nickname (optional)</label>
      <input id="nick" type="text" maxlength="64" autocomplete="nickname" />
      <label for="password">Password (8–72 characters)</label>
      <input id="password" type="password" required autocomplete="new-password" minlength="8" />
      <button class="btn btn--solid" type="submit">Create account</button>
    </form>
    <div class="row-links">
      <a href="account-login.html">Sign in</a>
      <a href="index.html">Home</a>
    </div>
  </div>
</div>
<script src="js/portal-api.js"></script>
<script>
(function () {
  var apiEl = document.getElementById('apiBase');
  try { apiEl.value = localStorage.getItem(HanPortal.API_KEY) || ''; } catch (e) {}
  apiEl.addEventListener('change', function () {
    try { localStorage.setItem(HanPortal.API_KEY, apiEl.value.trim()); } catch (e) {}
  });
  document.getElementById('form').onsubmit = function (ev) {
    ev.preventDefault();
    var err = document.getElementById('err');
    err.style.display = 'none';
    HanPortal.register({
      email: email.value.trim(),
      nickName: nick.value.trim(),
      password: password.value,
    })
      .then(function () {
        alert('Please check email for verification link. USD-only checkout applies at payment time.');
        window.location.href = 'account.html';
      })
      .catch(function (e) {
        err.textContent = e.message || 'Registration failed';
        err.style.display = 'block';
      });
  };
})();
</script>
</body>
</html>
