<!doctype html>





<html lang="en">





<head>





  <meta charset="utf-8" />





  <meta name="viewport" content="width=device-width, initial-scale=1" />





  <meta name="theme-color" content="#FAF8F5" />





  <meta name="acct-title-key" content="title.verify" />





  <title>Maison Han - Verify email</title>





  <link rel="preconnect" href="https://fonts.googleapis.com" />





  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />





  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300..600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />





  <link rel="stylesheet" href="css/accounts.css">





</head>





<body>





<div class="acct-shell">





  <header class="acct-bar">





    <div class="acct-bar__brand"><a href="index.html">Maison Han</a></div>





    <div class="acct-bar__tools">





      <div class="acct-lang">





        <span data-acct-i18n="acct.lang">Language</span>





                                <select id="acctLang" aria-label="Language">
          <option value="en">EN</option>
          <option value="zh-CN">????</option>
          <option value="zh-TW">·±ów</option>
          <option value="ja">ČŐ±ľ??</option>
          <option value="ko">????</option>
          <option value="fr">FR</option>
          <option value="es">ES</option>
          <option value="vi">VN</option>
          <option value="th">TH</option>
          <option value="ar">????</option>
        </select>





      </div>





    </div>





  </header>











  <div class="verify-block">





    <div class="api-box">





      <label for="apiBase" data-acct-i18n="api.label">API base</label>





      <input type="text" id="apiBase" data-acct-i18n-placeholder="api.placeholder" autocomplete="off" />





    </div>





    <div class="msg err" id="err"></div>





    <p class="muted" id="status" data-acct-i18n="meta.confirming">...</p>





    <div class="row-links">





      <a href="account-login.html" data-acct-i18n="link.signin">Sign in</a>





      <span class="acct-sep">&middot;</span>





      <a href="index.html" data-acct-i18n="link.home">Home</a>





    </div>





  </div>





</div>





<script src="js/account-i18n.js"></script>





<script src="js/portal-api.js"></script>





<script>





(function () {





  HanAccountI18n.init(document);





  try {





    document.getElementById('apiBase').value = localStorage.getItem(HanPortal.API_KEY) || '';





  } catch (e) {}





  document.getElementById('apiBase').addEventListener('change', function (ev) {





    try {





      localStorage.setItem(HanPortal.API_KEY, ev.target.value.trim());





    } catch (e) {}





  });





  var qs = new URLSearchParams(location.search);





  var token = qs.get('token');





  var errEl = document.getElementById('err');





  var st = document.getElementById('status');





  if (!token) {





    errEl.textContent = HanAccountI18n.t('err.missing_verify_token');





    errEl.style.display = 'block';





    st.textContent = '';





  } else {





    HanPortal.verifyEmailToken(token)





      .then(function () {





        st.textContent = HanAccountI18n.t('meta.verified_ok');





      })





      .catch(function (e) {





        errEl.textContent = e.message || HanAccountI18n.t('meta.verify_fail');





        errEl.style.display = 'block';





        st.textContent = '';





      });





  }





})();





</script>





</body>





</html>
