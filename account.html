<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FAF8F5" />
  <meta name="acct-title-key" content="title.account" />
  <title>Maison Han - My account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300..600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/accounts.css">
</head>
<body>
<div class="acct-shell">
  <header class="acct-bar">
    <div class="acct-bar__brand"><a href="index.html">Maison Han</a></div>
    <div class="acct-bar__tools">
      <div class="acct-lang">
        <span data-acct-i18n="acct.lang">Language</span>
                                <select id="acctLang" aria-label="Language">
          <option value="en">EN</option>
          <option value="zh-CN">中文</option>
          <option value="zh-TW">繁體</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">FR</option>
          <option value="es">ES</option>
          <option value="vi">VN</option>
          <option value="th">TH</option>
          <option value="ar">عربي</option>
        </select>
      </div>
    </div>
  </header>
  <div class="wrap">
    <div class="api-box">
      <label for="apiBase" data-acct-i18n="api.label">API base</label>
      <input type="text" id="apiBase" data-acct-i18n-placeholder="api.placeholder" />
    </div>
    <div class="msg err" id="err"></div>
    <div class="card">
      <p class="muted" id="meta"></p>
      <form id="pf">
        <label for="nick" data-acct-i18n="nick.label">Nickname</label>
        <input id="nick" type="text" maxlength="64" />
        <button class="btn btn--solid" type="submit" data-acct-i18n="btn.save_profile">Save profile</button>
      </form>
      <button class="btn" type="button" id="resend" style="margin-top:12px" data-acct-i18n="btn.resend">Resend verification email</button>
      <button class="btn" type="button" id="logout" style="margin-top:12px">Sign out</button>
      <div class="row-links"><a href="index.html" data-acct-i18n="link.home">Home</a></div>
    </div>
  </div>
</div>
<script src="js/account-i18n.js"></script>
<script src="js/portal-api.js"></script>
<script>
(function () {
  HanAccountI18n.init(document);
  globalThis.__hanAcctLangChange = function () {
    if (!HanPortal.getToken()) {
      meta.textContent = HanAccountI18n.t('meta.not_signed_in');
      logout.textContent = HanAccountI18n.t('btn.to_login');
      return;
    }
    meta.textContent = HanAccountI18n.t('meta.loading');
    HanPortal.me()
      .then(function (res) {
        var d = res.data || {};
        pf.style.display = '';
        showMember(d);
      })
      .catch(function () {
        meta.textContent = HanAccountI18n.t('meta.session_expired');
        pf.style.display = 'none';
        resend.style.display = 'none';
      });
  };
  try {
    apiBase.value = localStorage.getItem(HanPortal.API_KEY) || '';
  } catch (e) {}
  apiBase.onchange = function () {
    try {
      localStorage.setItem(HanPortal.API_KEY, apiBase.value.trim());
    } catch (e) {}
  };
  err.style.display = 'none';
  function showMember(d) {
    logout.textContent = HanAccountI18n.t('btn.signout');
    meta.textContent = HanAccountI18n.t('meta.line', {
      email: d.email || '',
      verified: d.emailVerified === '1' ? HanAccountI18n.t('verified.yes') : HanAccountI18n.t('verified.no'),
      points: d.pointsBalance != null ? d.pointsBalance : 0,
    });
    nick.value = d.nickName || '';
  }
  if (!HanPortal.getToken()) {
    meta.textContent = HanAccountI18n.t('meta.not_signed_in');
    logout.textContent = HanAccountI18n.t('btn.to_login');
    pf.style.display = 'none';
    resend.style.display = 'none';
    logout.onclick = function () {
      location.href = 'account-login.html';
    };
  } else {
    meta.textContent = HanAccountI18n.t('meta.loading');
    HanPortal.me()
      .then(function (res) {
        var d = res.data || {};
        showMember(d);
      })
      .catch(function () {
        meta.textContent = HanAccountI18n.t('meta.session_expired');
        pf.style.display = 'none';
        resend.style.display = 'none';
      });
    pf.onsubmit = function (ev) {
      ev.preventDefault();
      err.style.display = 'none';
      HanPortal.updateMe({ nickName: nick.value.trim() })
        .then(function (r) {
          showMember(r.data || {});
          alert(HanAccountI18n.t('alert.saved'));
        })
        .catch(function (e) {
          err.textContent = e.message;
          err.style.display = 'block';
        });
    };
    resend.onclick = function () {
      err.style.display = 'none';
      HanPortal.resendVerify()
        .then(function () {
          alert(HanAccountI18n.t('alert.resend'));
        })
        .catch(function (e) {
          err.textContent = e.message;
          err.style.display = 'block';
        });
    };
    logout.onclick = function () {
      HanPortal.logout().finally(function () {
        location.href = 'account-login.html';
      });
    };
  }
})();
</script>
</body>
</html>
