<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maison Han - Forgot password</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <script>window.__MAISON_API_BASE = "https://api.boozett.top";</script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Manrope:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="css/accounts.css">
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Q3GWTX0Z29"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Q3GWTX0Z29');
</script>
</head>
<body>
<div class="wrap">
  <div class="brand">Maison Han</div>
  <div class="msg err" id="err"></div>
  <div class="card">
    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" required />
      <button class="btn btn--solid" type="submit">Send reset link</button>
    </form>
    <div class="row-links">
      <a href="account-login.html">Sign in</a>
      &middot;
      <a href="index.html">Home</a>
    </div>
  </div>
</div>
<script src="js/portal-api.js"></script>
<script>
(function () {
  document.getElementById('form').onsubmit = function (ev) {
    ev.preventDefault();
    var err = document.getElementById('err');
    err.style.display = 'none';
    HanPortal.forgot(email.value.trim())
      .then(function (j) {
        alert(j.msg || 'If the email is registered, you will receive instructions.');
      })
      .catch(function (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      });
  };
})();
</script>
</body>
</html>
